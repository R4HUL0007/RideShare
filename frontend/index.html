<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0b" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RidexShare" />
    <meta name="application-name" content="RidexShare" />
    <meta name="description" content="RidexShare is a student carpooling platform — share and find rides with verified members of your university. Live tracking, secure payments and safety built in." />
    <meta name="keywords" content="RidexShare, university carpool, student ride sharing, campus rides, Parul University rides, carpooling, share a ride" />
    <meta name="author" content="RidexShare" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://ridexshare.online/" />

    <title>RidexShare — University Ride Sharing</title>

    <!-- Open Graph (link previews on WhatsApp, Facebook, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="RidexShare" />
    <meta property="og:title" content="RidexShare — University Ride Sharing" />
    <meta property="og:description" content="Share and find rides with verified members of your university — live tracking, secure payments and safety built in." />
    <meta property="og:url" content="https://ridexshare.online/" />
    <meta property="og:image" content="https://ridexshare.online/icons/icon.svg" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="RidexShare — University Ride Sharing" />
    <meta name="twitter:description" content="Share and find rides with verified members of your university — live tracking, secure payments and safety built in." />
    <meta name="twitter:image" content="https://ridexshare.online/icons/icon.svg" />
    <!-- Google Analytics (GA4) — only initialised on the production domain so
         local/Docker testing never pollutes the analytics data. -->
    <script>
      if (location.hostname === "ridexshare.online") {
        var gaScript = document.createElement("script");
        gaScript.async = true;
        gaScript.src = "https://www.googletagmanager.com/gtag/js?id=G-LFCVK3V9DF";
        document.head.appendChild(gaScript);
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        window.gtag = gtag;
        gtag("js", new Date());
        gtag("config", "G-LFCVK3V9DF");
      }
    </script>

    <!-- Google Maps API will be loaded by LoadScript component from @react-google-maps/api -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
