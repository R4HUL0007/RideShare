<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0b" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RidexShare" />
    <meta name="application-name" content="RidexShare" />
    <meta name="description" content="Share and find rides with verified members of your university — live tracking, secure payments and safety built in." />

    <title>RidexShare — University Ride Sharing</title>
    <!-- Google Maps API will be loaded by LoadScript component from @react-google-maps/api -->

    <!-- GPU rendering diagnostic switch (temporary). Toggle Chrome/Mali repaint
         suspects on-device via the URL, e.g. ?gpu=no-sticky , ?gpu=no-fixed ,
         ?gpu=no-anim , ?gpu=no-transform , ?gpu=no-shadow , ?gpu=no-blur ,
         ?gpu=no-gradient , ?gpu=flat  (combine with commas). ?gpu=off clears it.
         The choice persists (localStorage) across SPA navigation + reloads. -->
    <script>
      (function () {
        try {
          var q = new URLSearchParams(location.search).get('gpu');
          if (q === 'off' || q === 'none' || q === 'reset') localStorage.removeItem('rs-gpu');
          else if (q) localStorage.setItem('rs-gpu', q);
          var mode = localStorage.getItem('rs-gpu');
          if (mode) {
            mode.split(',').forEach(function (m) {
              m = m.trim();
              if (m) document.documentElement.classList.add('gpu-' + m);
            });
            document.documentElement.setAttribute('data-gpu', mode);
          }
        } catch (e) { /* ignore */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
